<!DOCTYPE html>
<html lang="it" data-theme="light" data-style="modern">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#6c5ce7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>Alina Lavoro</title>
  <style>
    :root{--bg:#f6f7fb;--surface:#fff;--surface2:#fff;--surface-alt:var(--surface2);--text:#1f2430;--muted:#667085;--border:rgba(31,36,48,.12);--border-soft:rgba(31,36,48,.08);--primary:#6c5ce7;--primary2:#00cec9;--primary-hover:#5a4dd6;--success:#0f9d58;--danger:#d63031;--warning:#f39c12;--shadow:0 4px 16px rgba(31,36,48,.10);--shadow-soft:0 2px 8px rgba(31,36,48,.07);--radius:18px;--radius-sm:12px;--transition:120ms ease;--font:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    html[data-theme="dark"]{--bg:#11131a;--surface:#1c1f2a;--surface2:#1c1f2a;--text:#f5f7fb;--muted:#a6adbb;--border:rgba(245,247,251,.13);--border-soft:rgba(245,247,251,.08);--shadow:0 4px 16px rgba(0,0,0,.22);--shadow-soft:0 2px 8px rgba(0,0,0,.16)}
    html[data-style="modern"]{--primary:#6c5ce7;--primary2:#00cec9}html[data-style="sport"]{--primary:#00b894;--primary2:#fd7e14}html[data-style="romantic"]{--primary:#e84393;--primary2:#a29bfe}html[data-style="loving"]{--primary:#ff7675;--primary2:#fab1a0}html[data-style="classic"]{--primary:#1d3557;--primary2:#457b9d}html[data-style="dramatic"]{--primary:#8e0038;--primary2:#6c5ce7}
    *{box-sizing:border-box}
    html{--kb-pad:0px;--nav-stack-h:92px}
    body{margin:0;min-height:100vh;min-height:100dvh;overflow-x:hidden;font-family:var(--font);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
    @supports (color-mix(in srgb,red,red)){
      @media(min-width:900px){
        body{background:radial-gradient(circle at top left,color-mix(in srgb,var(--primary) 26%,transparent),transparent 35%),radial-gradient(circle at top right,color-mix(in srgb,var(--primary2) 22%,transparent),transparent 35%),var(--bg)}
      }
    }
    button,input,select,textarea{font:inherit}
    button{border:0;cursor:pointer;transition:opacity var(--transition)}
    .hidden{display:none!important}
    .app{max-width:980px;margin:0 auto;padding:max(16px,env(safe-area-inset-top,0px)) 16px calc(100px + env(safe-area-inset-bottom,0px))}
    .topbar{display:flex;gap:12px;justify-content:space-between;align-items:center;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .brand-icon{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;color:#fff;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:var(--shadow-soft);flex:0 0 auto}
    .brand h1{font-size:22px;line-height:1.05;margin:0}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .top-actions{display:flex;align-items:center;gap:8px}
    .icon-btn{width:42px;height:42px;border-radius:12px;background:var(--surface2);color:var(--text);box-shadow:var(--shadow-soft);border:1px solid var(--border);display:grid;place-items:center;font-weight:800}
    .card{background:var(--surface2);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius);padding:18px;margin-bottom:16px}
    .hero{padding:22px;overflow:hidden;position:relative}
    .hero:after{content:"";position:absolute;width:220px;height:220px;right:-90px;top:-100px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary2));opacity:.16;pointer-events:none}
    .kicker{color:var(--muted);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .status-title{font-size:26px;line-height:1.12;margin:8px 0 6px;font-weight:900;letter-spacing:-.03em}
    .status-subtitle{margin:0;color:var(--muted);font-size:15px}
    .main-action{width:100%;min-height:84px;border-radius:20px;margin-top:18px;color:#fff;font-size:22px;font-weight:900;letter-spacing:.02em;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 4px 14px rgba(108,92,231,.22)}
    .main-action.danger{background:linear-gradient(135deg,#d63031,#fd7e14);box-shadow:0 4px 14px rgba(214,48,49,.22)}
    @supports (color-mix(in srgb,red,red)){
      @media(min-width:900px){
        .main-action{box-shadow:0 4px 14px color-mix(in srgb,var(--primary) 34%,transparent)}
      }
    }
    .grid{display:grid;gap:14px;grid-template-columns:repeat(3,1fr)}
    .metric{background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);padding:16px;min-height:108px}
    .metric .label{color:var(--muted);font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .metric .value{font-size:26px;line-height:1.05;font-weight:950;letter-spacing:-.04em}
    .metric .small{color:var(--muted);font-size:13px;margin-top:6px}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .secondary-btn,.ghost-btn,.danger-btn{min-height:48px;border-radius:14px;padding:0 15px;font-weight:800;transition:opacity var(--transition)}
    .secondary-btn{background:var(--surface2);color:var(--primary);border:2px solid var(--primary)}
    .ghost-btn{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .danger-btn{background:var(--surface2);color:var(--danger);border:2px solid rgba(214,48,49,.45)}
    @supports (color-mix(in srgb,red,red)){
      @media(min-width:900px){
        .secondary-btn{background:color-mix(in srgb,var(--primary) 14%,var(--surface2));border:1px solid color-mix(in srgb,var(--primary) 20%,transparent)}
        .danger-btn{background:color-mix(in srgb,var(--danger) 12%,var(--surface2));border:1px solid color-mix(in srgb,var(--danger) 20%,transparent)}
      }
    }
    .notice{border-radius:20px;border:1px solid rgba(243,156,18,.35);background:rgba(243,156,18,.12);padding:16px;margin-bottom:16px}
    html[data-theme="dark"] .notice{border-color:rgba(243,156,18,.45);background:rgba(243,156,18,.1)}
    @supports (color-mix(in srgb,red,red)){
      @media(min-width:900px){
        .notice{border:1px solid color-mix(in srgb,var(--warning) 32%,transparent);background:color-mix(in srgb,var(--warning) 14%,var(--surface))}
      }
    }
    .notice strong{display:block;margin-bottom:5px}
    .months-by-year{display:grid;gap:14px;margin-bottom:16px}
    .months-year-block{display:grid;gap:8px}
    .months-year-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:48px;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-weight:800;font-size:15px;text-align:left;touch-action:manipulation;-webkit-tap-highlight-color:transparent;position:relative;z-index:1;transition:opacity var(--transition)}
    .months-year-toggle-label{flex:1;min-width:0}
    .months-year-toggle-chev{flex-shrink:0;font-size:16px;line-height:1;color:var(--muted);font-weight:800}
    .months-year-panel{display:block}
    .months-year-panel.months-year-panel--collapsed{display:none}
    .list{display:grid;gap:10px}
    .list-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;display:grid;gap:6px}
    .list-item-title{font-weight:900;font-size:17px}
    .list-item-sub{color:var(--muted);font-size:14px}
    .list-item--month{padding:12px;gap:4px}
    .list-item--month .list-item-title{font-size:16px}
    .list-item--month .list-item-sub{font-size:13px;line-height:1.35}
    .list-item--month .list-item-meta{font-size:13px;color:var(--muted);line-height:1.4}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:var(--surface2);color:var(--primary);font-size:13px;font-weight:800;border:1px solid var(--border)}
    @supports (color-mix(in srgb,red,red)){
      @media(min-width:900px){
        .pill{background:color-mix(in srgb,var(--primary) 12%,transparent);border:0}
      }
    }
    .nav{position:fixed;left:50%;bottom:calc(12px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);width:min(94vw,520px);background:var(--surface2);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px;z-index:40;pointer-events:auto}
    .nav button{min-height:54px;border-radius:16px;color:var(--muted);background:transparent;font-weight:800;display:grid;place-items:center;gap:2px;font-size:12px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:opacity var(--transition),background var(--transition)}
    .nav button.active{color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary2));opacity:1}
    .nav .ico{font-size:19px;line-height:1}
    .field{display:grid;gap:8px;margin-bottom:14px}
    label{font-weight:850;font-size:14px;color:var(--text)}
    input,select,textarea{width:100%;min-height:54px;border:1px solid var(--border);border-radius:14px;padding:12px 14px;background:var(--surface2);color:var(--text);outline:none;scroll-margin-bottom:120px;transition:border-color var(--transition)}input:focus,select:focus,textarea:focus{border-color:var(--primary)}
    textarea{min-height:100px;resize:vertical}
    .time-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .time-choice-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
    .time-choice-btn{min-height:72px;font-size:21px;font-weight:950;border-radius:18px;width:100%;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:10050;display:none;align-items:flex-end;justify-content:center;padding:12px;padding-bottom:max(12px,env(safe-area-inset-bottom,0px));pointer-events:auto}
    .modal-backdrop.show{display:flex}
    html[data-theme="dark"] .modal-backdrop{background:rgba(0,0,0,.72)}
    .modal{width:min(680px,100%);max-height:min(92dvh,92vh,820px);display:flex;flex-direction:column;overflow:hidden;background:var(--surface);color:var(--text);border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.35);border:1px solid var(--border);padding:0;position:relative;z-index:1}
    .modal-header{flex:0 0 auto;display:flex;justify-content:space-between;gap:10px;align-items:center;padding:16px 18px 8px;border-bottom:1px solid var(--border)}
    .modal-title{margin:0;font-size:22px;font-weight:950}
    .modal-body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 18px calc(20px + env(safe-area-inset-bottom,0px) + var(--kb-pad));overscroll-behavior:contain}
    .login-wrap{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:max(12px,env(safe-area-inset-top,0px)) 18px max(20px,env(safe-area-inset-bottom,0px));overflow-y:auto;-webkit-overflow-scrolling:touch}
    .login{width:min(440px,100%);margin:auto 0;background:var(--surface2);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:20px;padding:22px 20px}
    #loginBtn{scroll-margin-bottom:32px}
    .login h1{font-size:28px;margin:10px 0 4px;letter-spacing:-.04em}
    .login p{color:var(--muted);margin:0 0 14px}
    .help{color:var(--muted);font-size:13px;line-height:1.35}
    .app-version{margin:14px 0 0;padding-top:12px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;line-height:1.35;text-align:center}
    .credit{margin:8px 0 0;color:var(--muted);font-size:12px;line-height:1.35;text-align:center}
    .tooltip{width:22px;height:22px;border-radius:50%;display:inline-grid;place-items:center;background:var(--surface2);color:var(--primary);font-size:12px;font-weight:800;border:1px solid var(--border)}
    @supports (color-mix(in srgb,red,red)){
      @media(min-width:900px){
        .tooltip{background:color-mix(in srgb,var(--primary) 15%,transparent);border:0}
      }
    }
    .toast{position:fixed;left:50%;bottom:calc(100px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);background:#111827;color:#fff;padding:12px 16px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:70;display:none;font-weight:800;max-width:92vw;text-align:center}
    .toast.show{display:block}
    .month-detail-sticky-header{display:none}
    @media(max-width:899px){
      :root{--shadow:0 2px 10px rgba(31,36,48,.08)}
      html[data-theme="dark"]{--shadow:0 2px 10px rgba(0,0,0,.20)}
      .app{max-width:540px;width:100%;margin-left:auto;margin-right:auto;padding-top:max(16px,env(safe-area-inset-top,0px));padding-bottom:calc(var(--nav-stack-h) + 36px + env(safe-area-inset-bottom,0px));padding-left:max(14px,env(safe-area-inset-left,0px));padding-right:max(14px,env(safe-area-inset-right,0px))}
      .grid,.time-grid{grid-template-columns:1fr}
      .card{backdrop-filter:none;background:var(--surface2);box-shadow:var(--shadow)}
      .card.hero{border-radius:20px}
      .nav{z-index:9999;background:var(--surface2);box-shadow:0 2px 12px rgba(0,0,0,.10);width:min(calc(100vw - 16px),520px);padding:6px;gap:4px;border-radius:18px;pointer-events:auto}
      .toast{z-index:10001}
      .modal-backdrop{z-index:10050}
      .nav button{min-height:48px;border-radius:12px;font-size:11px;padding:2px 4px}
      .nav .ico{font-size:17px;line-height:1}
      .icon-btn{box-shadow:0 4px 12px rgba(0,0,0,.06)}
      .brand-icon{box-shadow:0 6px 16px rgba(0,0,0,.1)}
      .hero{padding:16px}
      .hero:after{opacity:.1;width:160px;height:160px}
      .main-action{min-height:68px;font-size:19px;margin-top:12px;border-radius:18px}
      .status-title{font-size:21px}
      .metric{min-height:84px;padding:12px}
      .metric .value{font-size:21px}
      .brand h1{font-size:20px}
      .top-actions{gap:6px}
      .icon-btn{width:40px;height:40px;border-radius:14px}
      .login{width:min(440px,calc(100vw - 24px));max-width:100%;padding:20px 16px}
      .login h1{font-size:26px}
      .list-item--month{padding:10px 11px;gap:3px;border-radius:16px}
      .list-item--month .list-item-title{font-size:15px;line-height:1.22}
      .list-item--month .list-item-sub{font-size:12px;line-height:1.38}
      .list-item--month .list-item-meta{font-size:12px;line-height:1.38}
      .list-item--month .btn-row{margin-top:10px}
      .list-item--month .secondary-btn{min-height:44px;padding:0 12px;font-size:13px;border-radius:11px}
      .months-year-toggle{min-height:50px;padding:11px 13px;font-size:14px;border-radius:var(--radius-sm)}
      .months-year-toggle-chev{font-size:15px}
      .list--months{grid-template-columns:1fr;gap:10px;align-items:stretch}
      .list--months > .list-item--month{min-width:0}
      #content{padding-bottom:12px}
      .month-detail-sticky-header{display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 0 8px;margin-bottom:6px}
      .month-detail-sticky-title{font-weight:900;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .month-detail-head{display:none}
      .month-detail-head .status-title{margin:0;flex:1;min-width:0}
      .month-detail-metrics-card{padding:14px;margin-bottom:12px}
      .month-detail-metrics{margin-bottom:0}
      .month-detail-days-kicker{margin:10px 0 8px}
      .month-detail-day-list{gap:8px}
      .month-detail-day{padding:10px 12px;gap:6px;border-radius:16px}
      .month-detail-day-date{font-weight:900;font-size:15px;line-height:1.2;margin-bottom:4px}
      .month-detail-day-stats{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:baseline}
      .month-detail-day-stat{font-size:13px;line-height:1.35}
      .month-detail-day-stat-label{color:var(--muted);font-weight:700;margin-right:4px}
      .month-detail-day-stat-val{font-weight:800}
      .month-detail-day-bar{height:5px;border-radius:999px;background:rgba(31,36,48,.08);overflow:hidden;margin-top:6px}
      html[data-theme="dark"] .month-detail-day-bar{background:rgba(245,247,251,.1)}
      .month-detail-day-bar-fill{height:100%;min-width:0;max-width:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--primary2))}
    }
    @media(max-width:360px){
      .list--months{grid-template-columns:1fr}
    }
    @media(min-width:900px){
      .app{padding-bottom:32px}
      .months-by-year{gap:16px}
      .nav{position:sticky;transform:none;width:100%;max-width:980px;margin:8px auto 18px;bottom:auto;left:auto;top:8px;order:-1}
    }
    @media(max-width:1024px) and (orientation:portrait){
      .app{max-width:540px}
      .grid,.time-grid{grid-template-columns:1fr}
      .nav{width:min(calc(100vw - 16px),520px)}
    }
    .analytics-card{overflow:hidden}
    .analytics-toggle{width:100%;text-align:left;background:none;border:none;color:var(--primary);font-size:13px;font-weight:900;padding:2px 0 6px;cursor:pointer;display:flex;align-items:center;gap:8px}
    .analytics-body{display:block}
    .analytics-body--hidden{display:none}
    .analytics-section{margin-top:14px}
    .analytics-section-title{color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
    .chart-bar-row{display:grid;grid-template-columns:58px 1fr 46px;gap:5px;align-items:center;margin-bottom:5px}
    .chart-bar-label{font-size:11px;color:var(--muted);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .chart-bar-track{height:12px;border-radius:999px;background:rgba(31,36,48,.1);overflow:hidden}
    html[data-theme="dark"] .chart-bar-track{background:rgba(245,247,251,.12)}
    .chart-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--primary2));min-width:2px}
    .chart-bar-value{font-size:11px;font-weight:900;text-align:right;color:var(--text)}
    .chart-compare-row{margin-bottom:7px}
    .chart-compare-month{font-size:11px;color:var(--muted);font-weight:800;margin-bottom:3px}
    .chart-compare-bars{display:grid;gap:3px}
    .chart-compare-track{height:10px;border-radius:999px;background:rgba(31,36,48,.1);overflow:hidden;position:relative}
    html[data-theme="dark"] .chart-compare-track{background:rgba(245,247,251,.1)}
    .chart-compare-fill{position:absolute;left:0;top:0;height:100%;border-radius:999px}
    .chart-compare-fill.est{background:var(--primary);opacity:.55}
    .chart-compare-fill.real{background:var(--primary2)}
    .chart-compare-vals{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:1px}
    .analytics-annual-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .analytics-metric{background:var(--bg);border-radius:14px;border:1px solid var(--border);padding:10px 12px}
    .analytics-metric-label{color:var(--muted);font-size:11px;margin-bottom:4px}
    .analytics-metric-value{font-size:17px;font-weight:950;letter-spacing:-.03em}
    .boot-card{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
    .page-heading{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0 16px;padding:0;background:transparent;border:0;box-shadow:none;text-align:center}
    .page-heading-icon{font-size:22px;line-height:1}
    .page-heading-title{margin:0;font-size:22px;font-weight:900;letter-spacing:-.03em;color:var(--text)}
    @media(max-width:899px){.page-heading{margin:4px 0 12px}.page-heading-title{font-size:20px}.page-heading-icon{font-size:20px}}
    .home-summary{padding:16px}
    .home-summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}
    .home-metric{display:flex;flex-direction:column;gap:4px;padding:12px;border-radius:14px;border:1px solid var(--border-soft);background:var(--bg);min-width:0}
    html[data-theme="dark"] .home-metric{background:rgba(245,247,251,.04)}
    .home-metric-label{color:var(--muted);font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .home-metric-value{font-size:20px;font-weight:900;letter-spacing:-.03em;line-height:1.1;min-width:0;word-break:break-word}
    .home-metric-sub{color:var(--muted);font-size:11px;margin-top:2px}
    .home-summary-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;flex-wrap:wrap}
    @media(max-width:360px){.home-summary-grid{grid-template-columns:1fr}}

    function renderImportExportSection_(){return`<section class="card"><div class="kicker">📦</div><div class="status-title">Importa / Esporta dati</div><div style="margin-top:8px"><div class="kicker">Esporta</div><div class="btn-row"><button class="secondary-btn" onclick="doExportJson_()">Backup JSON</button><button class="secondary-btn" onclick="doExportShiftsCsv_()">Turni CSV</button><button class="secondary-btn" onclick="doExportSalariesCsv_()">Stipendi CSV</button><button class="secondary-btn" onclick="doExportNotesCsv_()">Note CSV</button></div><p class="help">L'esportazione apre una finestra: copia il testo e incollalo in un nuovo Google Sheet o salvalo come file dal Blocco note.</p></div><div style="margin-top:18px"><div class="kicker">Importa</div><div class="field"><label>Tipo dati</label><select id="ie_dataType"><option value="">Auto (rilevamento da intestazioni)</option><option value="shifts">Turni</option><option value="salaries">Stipendi</option><option value="notes">Note</option></select></div><div class="field"><label>Sorgente</label><select id="ie_source" onchange="onImportSourceChange_()"><option value="csv">Incolla CSV / TSV (anche da Google Sheets)</option><option value="json">Incolla backup JSON</option><option value="tab">Foglio del Google Sheet corrente</option></select></div><div class="field" id="ie_tabField" style="display:none"><label>Nome del foglio (tab)</label><input id="ie_sheetName" type="text" placeholder="es. Importa"><p class="help">Crea o usa un foglio nello stesso Google Sheet e indica qui il nome del tab. La prima riga deve contenere le intestazioni.</p></div><div class="field" id="ie_textField"><label>Dati</label><textarea id="ie_text" rows="6" style="font-family:monospace;font-size:12px" placeholder="Incolla qui CSV/TSV o JSON..."></textarea></div><div class="btn-row"><button class="secondary-btn" onclick="doPreviewImport_()">Anteprima</button><button class="ghost-btn" onclick="resetImportForm_()">Pulisci</button></div><div id="ie_preview" style="margin-top:14px"></div></div><div class="notice" style="margin-top:14px"><strong>🛡️ Sicurezza</strong><div style="margin-top:6px">L'anteprima non scrive nulla. Prima dell'importazione viene creato un backup automatico dei fogli interessati (max 5 backup per foglio). Modalità predefinita: <strong>unisci, salta duplicati</strong>. Nessuna sostituzione totale.</div></div></section>`}
    function onImportSourceChange_(){var src=val('ie_source');var tf=document.getElementById('ie_tabField');var xf=document.getElementById('ie_textField');var ta=document.getElementById('ie_text');if(tf&&xf){if(src==='tab'){tf.style.display='';xf.style.display='none'}else{tf.style.display='none';xf.style.display=''}}if(ta)ta.placeholder=src==='json'?'Incolla qui il backup JSON esportato dall\'app...':'Incolla qui CSV o TSV (anche copiato da Google Sheets)...'}
    function resetImportForm_(){setVal('ie_text','');setVal('ie_sheetName','');setVal('ie_dataType','');var s=document.getElementById('ie_source');if(s)s.value='csv';onImportSourceChange_();var p=document.getElementById('ie_preview');if(p)p.innerHTML='';state.__importPreview=null}
    async function doExportJson_(){toast('Esportazione...');try{const res=await serverCall('exportAllData',[state.accessCode]);if(!res||!res.success){toast('Errore export');return}showExportModal_('Backup JSON completo',JSON.stringify(res.data,null,2),'alina-backup.json')}catch(e){toast('Errore: '+(e&&e.message?e.message:String(e)))}}

    function showExportModal_(title,text,filename){const safeText=esc(text);const body='<p class="help">Copia il testo qui sotto e incollalo in un nuovo Google Sheet, oppure salvalo come file <strong>'+esc(filename)+'</strong> da Blocco note.</p><textarea id="exportContent" rows="10" style="font-family:monospace;font-size:11px;width:100%" readonly>'+safeText+'</textarea><div class="btn-row"><button class="main-action" onclick="copyExportToClipboard_()">Copia</button><button class="ghost-btn" onclick="closeModal()">Chiudi</button></div>';openModal(title,body);setTimeout(function(){var ta=document.getElementById('exportContent');if(ta){try{ta.focus();ta.select()}catch(_){}}},80)}

    async function doPreviewImport_(){const source=val('ie_source')||'csv';const dataType=val('ie_dataType')||'';const text=val('ie_text');const sheetName=val('ie_sheetName');const target=document.getElementById('ie_preview');if(target)target.innerHTML='<div class="card"><p class="help">Anteprima in corso...</p></div>';try{let res;if(source==='json')res=await serverCall('previewImportFromJson',[state.accessCode,text]);else if(source==='tab')res=await serverCall('previewImportFromSheetTab',[state.accessCode,sheetName,dataType]);else res=await serverCall('previewImportFromCsv',[state.accessCode,text,dataType]);renderImportPreview_(res)}catch(e){if(target)target.innerHTML='<div class="card"><strong>Errore anteprima:</strong> '+esc(e&&e.message?e.message:String(e))+'</div>'}}
    function renderImportPreview_(res){const target=document.getElementById('ie_preview');if(!target)return;if(!res||!res.success){target.innerHTML='<div class="card"><strong>Anteprima non riuscita:</strong> '+esc((res&&res.message)||'Errore sconosciuto')+'</div>';state.__importPreview=null;return}state.__importPreview=res;let html='<section class="card"><div class="kicker">Anteprima import</div>';let anyData=false;if(res.sections){html+='<p>Sorgente: <strong>backup JSON</strong>'+(res.exportedAt?' · esportato '+esc(res.exportedAt):'')+(res.format?' · formato '+esc(res.format):'')+'</p>';['shifts','salaries','notes'].forEach(function(type){const s=res.sections[type];if(!s||s.totalRows===0)return;anyData=true;const lbl=type==='shifts'?'Turni':type==='salaries'?'Stipendi':'Note';html+='<div style="margin:8px 0;padding:10px;border:1px solid var(--border);border-radius:12px"><strong>'+esc(lbl)+'</strong><div class="small" style="margin-top:4px">Totale: '+s.totalRows+' · Nuove: '+s.freshCount+' · Duplicati: '+s.duplicateCount+' · Invalide: '+s.invalidCount+'</div></div>'});if(!anyData)html+='<p class="help">Nessuna sezione con dati nel backup.</p>'}else{const lbl=res.dataType==='shifts'?'Turni':res.dataType==='salaries'?'Stipendi':'Note';html+='<p>Tipo: <strong>'+esc(lbl)+'</strong> · Sorgente: '+esc(res.source||'')+'</p>';html+='<p>Totale: <strong>'+res.totalRows+'</strong> · Nuove: <strong>'+res.freshCount+'</strong> · Duplicati: <strong>'+res.duplicateCount+'</strong> · Invalide: <strong>'+res.invalidCount+'</strong></p>';anyData=res.freshCount>0;if(res.sample&&res.sample.length){html+='<div class="kicker" style="margin-top:8px">Esempi righe nuove</div><ul style="margin:6px 0 0;padding-left:18px;font-size:12px">';res.sample.forEach(function(s){html+='<li>'+esc(s)+'</li>'});html+='</ul>'}if(res.duplicateSamples&&res.duplicateSamples.length){html+='<div class="kicker" style="margin-top:8px">Duplicati (saltati)</div><ul style="margin:6px 0 0;padding-left:18px;font-size:12px;color:var(--muted)">';res.duplicateSamples.forEach(function(s){html+='<li>'+esc(s)+'</li>'});html+='</ul>'}if(res.invalidSamples&&res.invalidSamples.length){html+='<div class="kicker" style="margin-top:8px">Righe invalide (escluse)</div><ul style="margin:6px 0 0;padding-left:18px;font-size:12px;color:var(--danger)">';res.invalidSamples.forEach(function(it){html+='<li>'+esc(it.sample||'')+' — <em>'+esc((it.errors||[]).join('; '))+'</em></li>'});html+='</ul>'}}html+='<div class="notice" style="margin-top:12px"><strong>🛡️ Conferma import</strong><div style="margin-top:4px">Verrà creato un backup automatico dei fogli interessati prima della scrittura. Modalità: <strong>unisci, salta duplicati</strong>.</div></div>';html+='<div class="btn-row">'+(anyData?'<button class="main-action" onclick="doApplyImport_()">Importa ora</button>':'<span class="pill">Nessuna riga nuova da importare</span>')+'<button class="ghost-btn" onclick="cancelImportPreview_()">Annulla</button></div></section>';target.innerHTML=html}
    function cancelImportPreview_(){state.__importPreview=null;var p=document.getElementById('ie_preview');if(p)p.innerHTML=''}
    async function doApplyImport_(){const preview=state.__importPreview;if(!preview||!preview.success){toast('Esegui prima l\'anteprima');return}let payload=null;if(preview.sections){payload={sections:{}};['shifts','salaries','notes'].forEach(function(k){const s=preview.sections[k];if(s&&s.payload&&Array.isArray(s.payload.rows)&&s.payload.rows.length>0){payload.sections[k]={rows:s.payload.rows}}});if(Object.keys(payload.sections).length===0){toast('Nessuna riga valida da importare');return}}else if(preview.payload&&Array.isArray(preview.payload.rows)&&preview.payload.rows.length>0){payload={dataType:preview.payload.dataType,rows:preview.payload.rows}}else{toast('Nessuna riga valida da importare');return}const target=document.getElementById('ie_preview');if(target)target.innerHTML='<div class="card"><p class="help">Importazione in corso... (creazione backup automatico)</p></div>';try{const res=await serverCall('applyImport',[state.accessCode,payload,{mode:'merge_skip_duplicates'}]);renderApplyResult_(res);if(res&&res.success){try{const boot=await serverCall('getBootstrap',[state.accessCode]);if(boot&&boot.success){mergeServerData(boot.data);saveCache()}}catch(_){}}}catch(e){if(target)target.innerHTML='<div class="card"><strong>Errore import:</strong> '+esc(e&&e.message?e.message:String(e))+'</div>'}}
    function renderApplyResult_(res){const target=document.getElementById('ie_preview');if(!target)return;if(!res||!res.success){var errHtml='<div class="card"><strong>Import non riuscito:</strong> '+esc((res&&res.message)||'Errore')+'</div>';if(res&&res.errors&&res.errors.length){errHtml='<div class="card"><strong>Import non riuscito.</strong><ul style="margin:6px 0 0;padding-left:18px;font-size:12px;color:var(--danger)">'+res.errors.slice(0,10).map(function(e){return'<li>'+esc(e)+'</li>'}).join('')+'</ul></div>'}target.innerHTML=errHtml;return}let html='<section class="card"><div class="kicker">✅ Importazione completata</div>';html+='<p>Inserite: <strong>'+res.inserted+'</strong> · Aggiornate: <strong>'+res.updated+'</strong> · Saltate (duplicati): <strong>'+res.skipped+'</strong> · Fallite: <strong>'+res.failed+'</strong></p>';if(res.backups&&res.backups.length){html+='<p class="help">Backup creati per: '+esc(res.backups.join(', '))+' (suffisso <code>_BACKUP_yyyymmdd_hhmmss</code>; max 5 per foglio).</p>'}if(res.errors&&res.errors.length){html+='<div class="kicker">Errori</div><ul style="margin:6px 0 0;padding-left:18px;font-size:12px;color:var(--danger)">';res.errors.slice(0,10).forEach(function(e){html+='<li>'+esc(e)+'</li>'});html+='</ul>'}html+='<div class="btn-row"><button class="main-action" onclick="resetImportForm_()">Chiudi</button></div></section>';target.innerHTML=html;state.__importPreview=null}
    function hhmmToMinutes(hm){var parts=String(hm||'0:0').split(':');var h=Number(parts[0])||0,m=Number(parts[1])||0;return h*60+m}
    function minutesToHHMM(t){t=Math.round(Number(t)||0);if(t>=1440)t=0;var h=Math.floor(t/60),m=t%60;return(String(h<10?'0':'')+h)+':'+(String(m<10?'0':'')+m)}
    function isHHMMOnFiveStep(hm){return hhmmToMinutes(hm)%5===0}
    function fiveMinuteFloorCeilStrings(hm){var m=hhmmToMinutes(hm);var lo=Math.floor(m/5)*5,hi=Math.ceil(m/5)*5;return{loStr:minutesToHHMM(lo),hiStr:minutesToHHMM(hi)}}
    function openTimePickModal_(which,detected,loStr,hiStr,shiftRef){var title=which==='inizio'?t('time_pick_title_inizio'):t('time_pick_title_fine');state.__timePick={which:which,shift:shiftRef};var body='<p class="help" style="margin:0 0 4px">'+esc(t('time_detected'))+'</p><p style="font-size:20px;font-weight:900;margin:0 0 14px">'+esc(detected)+'</p><div class="time-choice-row"><button type="button" class="time-choice-btn secondary-btn" onclick="confirmTimePick(\''+loStr+'\')">'+esc(loStr)+'</button><button type="button" class="time-choice-btn secondary-btn" onclick="confirmTimePick(\''+hiStr+'\')">'+esc(hiStr)+'</button></div>';openModal(title,body)}
    function confirmTimePick(chosen){var p=state.__timePick;if(!p)return;var which=p.which,shift=p.shift;state.__timePick=null;closeModal();if(which==='inizio')commitStartWork(shift,chosen);else commitEndWork(shift,chosen)}
    function commitStartWork(s,hm){s.inizio=hm;s.fine='';s.minuti_lavorati=0;s.aggiornato_il=new Date().toISOString();upsertLocalShift(s);enqueue({type:'saveShift',payload:s});render();toast(t('started_at')+' '+s.inizio);flushQueue()}
    function commitEndWork(s,hm){s.fine=hm;s.minuti_lavorati=computeMinutes(s.inizio,s.fine,Number(s.pausa_minuti||0));s.aggiornato_il=new Date().toISOString();upsertLocalShift(s);recomputeLocalSummaries();enqueue({type:'saveShift',payload:s});render();toast(t('saved')+': '+minutesLabel(s.minuti_lavorati));flushQueue()}
    function startWork(){var s=getTodayShift();if(s&&s.inizio&&!s.fine)return toast(t('started_at')+' '+s.inizio);if(!s)s=newShift(today());var det=currentTime();if(isHHMMOnFiveStep(det)){commitStartWork(s,det);return}var fc=fiveMinuteFloorCeilStrings(det);openTimePickModal_('inizio',det,fc.loStr,fc.hiStr,s)}
    function endWork(){var s=getTodayShift();if(!s||!s.inizio)return openManualShiftModal();var det=currentTime();if(isHHMMOnFiveStep(det)){commitEndWork(s,det);return}var fc=fiveMinuteFloorCeilStrings(det);openTimePickModal_('fine',det,fc.loStr,fc.hiStr,s)}
    function openManualShiftModal(shiftId,dateOverride){let s;if(shiftId){s=state.shifts.find(x=>x.id===shiftId)}else if(dateOverride){s=state.shifts.find(x=>x.data===dateOverride)||newShift(dateOverride)}else{s=getTodayShift()||newShift(today())}if(!s)s=newShift(today());openModal(t('edit_times'),`<div class="field"><label>${t('date')}</label><input id="m_data" type="date" value="${s.data||today()}"></div><div class="time-grid"><div class="field"><label>${t('start')}</label><input id="m_inizio" type="time" step="300" value="${s.inizio||'08:30'}"></div><div class="field"><label>${t('end')}</label><input id="m_fine" type="time" step="300" value="${s.fine||''}"></div></div><div class="field"><label>${t('pause')}</label><input id="m_pausa" type="number" min="0" step="5" value="${s.pausa_minuti||0}"></div><div class="field"><label>${t('note')}</label><textarea id="m_nota">${esc(s.nota||'')}</textarea></div><button class="main-action" onclick="saveManualShift('${s.id}')">${t('save')}</button>`)}function saveManualShift(id){const s=state.shifts.find(x=>x.id===id)||newShift(val('m_data'));s.data=val('m_data');s.inizio=val('m_inizio');s.fine=val('m_fine');s.pausa_minuti=Number(val('m_pausa')||0);s.nota=val('m_nota');s.manuale=true;s.minuti_lavorati=computeMinutes(s.inizio,s.fine,s.pausa_minuti);s.aggiornato_il=new Date().toISOString();upsertLocalShift(s);recomputeLocalSummaries();enqueue({type:'saveShift',payload:s});closeModal();render();toast(t('saved'));flushQueue()}
    function openSalaryModal(monthWorked,monthPayslip){const mw=monthWorked||previousMonth(today()),mb=monthPayslip||currentMonth(),summary=state.summaries.find(s=>s.mese===mw),existing=state.salaries.find(s=>s.mese_lavorato===mw);openModal(t('salary'),`<div class="field"><label>${t('worked_month')}</label><input id="sal_mese_lavorato" type="month" value="${mw}"></div><div class="field"><label>${t('payslip_month')}</label><input id="sal_mese_busta" type="month" value="${mb}"></div><div class="field"><label>${t('amount')}</label><input id="sal_importo" type="number" step="1" min="0" value="${existing?existing.importo_reale:''}" placeholder="700"></div><div class="field"><label>${t('note')}</label><textarea id="sal_note">${existing?esc(existing.note||''):''}</textarea></div><p class="help">${t('month_hours')}: ${summary?summary.ore_label:'0 h 00 min'}</p><button class="main-action" onclick="saveSalaryLocal('${existing?existing.id:''}')">${t('save')}</button>`)}function saveSalaryLocal(existingId){const mw=val('sal_mese_lavorato'),summary=state.summaries.find(s=>s.mese===mw),amount=Number(val('sal_importo')||0),hours=summary?Number(summary.ore||0):0;const salary={id:existingId||uid('salary'),mese_lavorato:mw,mese_busta:val('sal_mese_busta'),data_inserimento:today(),importo_reale:amount,ore_mese:hours,tariffa_effettiva:hours>0?amount/hours:0,note:val('sal_note'),creato_il:new Date().toISOString(),aggiornato_il:new Date().toISOString()};upsertLocalSalary(salary);recomputeLocalSummaries();enqueue({type:'saveSalary',payload:salary});closeModal();render();toast(t('saved'));flushQueue()}
    function openNoteModal(){openModal(t('new_note'),`<div class="field"><label>${t('date')}</label><input id="note_data" type="date" value="${today()}"></div><div class="field"><label>Tipo</label><select id="note_tipo"><option value="generale">Generale</option><option value="giorno">Giorno</option><option value="busta_paga">Busta paga</option></select></div><div class="field"><label>${t('note')}</label><textarea id="note_testo" placeholder="Scrivi una nota..."></textarea></div><button class="main-action" onclick="saveNoteLocal()">${t('save')}</button>`)}function saveNoteLocal(){state._localMutationAt=Date.now();const n={id:uid('note'),data:val('note_data'),tipo:val('note_tipo'),testo:val('note_testo'),completata:false,creato_il:new Date().toISOString(),aggiornato_il:new Date().toISOString()};state.notes.unshift(n);saveCache();enqueue({type:'saveNote',payload:n});closeModal();render();toast(t('saved'));flushQueue()}function toggleNoteDone(id){state._localMutationAt=Date.now();const n=state.notes.find(x=>x.id===id);if(!n)return;n.completata=String(n.completata)==='true'?'false':'true';n.aggiornato_il=new Date().toISOString();saveCache();enqueue({type:'saveNote',payload:n});render();flushQueue()}function deleteNoteLocal(id){state._localMutationAt=Date.now();state.notes=state.notes.filter(n=>n.id!==id);saveCache();enqueue({type:'deleteNote',payload:{id}});render();flushQueue()}
    function saveSettings(){state._localMutationAt=Date.now();const patch={lingua:val('cfg_lingua'),tema:val('cfg_tema'),stile:val('cfg_stile'),giorno_busta:val('cfg_giorno_busta'),media_mesi:val('cfg_media_mesi'),setup_completato:'yes'};state.config={...state.config,...patch};delete state.config.codice_accesso;applyThemeLang();saveCache();enqueue({type:'saveConfig',payload:patch});toast(t('saved'));setPage('home');flushQueue()}
    function openSetupModal(){openModal(t('setup'),`<div class="field"><label>${t('language')}</label><select id="setup_lingua"><option value="it">Italiano</option><option value="ru">Русский</option></select></div><div class="field"><label>${t('theme')}</label><select id="setup_tema"><option value="light">${t('light')}</option><option value="dark">${t('dark')}</option></select></div><div class="field"><label>${t('style')}</label><select id="setup_stile"><option value="modern">${t('modern')}</option><option value="romantic">${t('romantic')}</option><option value="sport">${t('sport')}</option><option value="loving">${t('loving')}</option><option value="classic">${t('classic')}</option><option value="dramatic">${t('dramatic')}</option></select></div><div class="time-grid"><div class="field"><label>${t('payroll_day')}</label><input id="setup_giorno" type="number" min="1" max="31" value="10"></div><div class="field"><label>${t('avg_months')}</label><select id="setup_media"><option value="3">3</option><option value="6" selected>6</option><option value="99">Tutti</option></select></div></div><button class="main-action" onclick="saveSetup()">${t('save')}</button>`)}function saveSetup(){state._localMutationAt=Date.now();state.config={...state.config,lingua:val('setup_lingua'),tema:val('setup_tema'),stile:val('setup_stile'),giorno_busta:val('setup_giorno'),media_mesi:val('setup_media'),setup_completato:'yes'};closeModal();applyThemeLang();render();enqueue({type:'saveConfig',payload:state.config});saveCache();flushQueue()}
    async function flushQueue(){const q=getQueue();if(!q.length)return;if(!navigator.onLine)return render();var _fqStart=Date.now();try{const res=await serverCall('syncBatch',[state.accessCode,q]);localStorage.setItem(LS_QUEUE,JSON.stringify([]));if(res&&res.success){if(state._localMutationAt>_fqStart){state.config={...(res.data.config||{}),...state.config};var _lids=new Set(state.shifts.map(function(x){return x.id}));(res.data.shifts||[]).forEach(function(ss){if(!_lids.has(ss.id))state.shifts.push(ss)});if(!(state.salaries&&state.salaries.length))state.salaries=res.data.salaries||[];if(!(state.notes&&state.notes.length))state.notes=res.data.notes||[];state.summaries=res.data.summaries||[]}else{mergeServerData(res.data)}applyThemeLang();state.serverOk=true;saveCache();render();toast(t('synced'))}}catch(err){state.serverOk=false;toast(t('sync_error'));render()}}
    function enqueue(action){const q=getQueue();q.push(action);localStorage.setItem(LS_QUEUE,JSON.stringify(q));saveCache()}function getQueue(){try{return JSON.parse(localStorage.getItem(LS_QUEUE)||'[]')}catch(e){return[]}}function saveCache(){localStorage.setItem(LS_CACHE,JSON.stringify({accessCode:state.accessCode,config:state.config,shifts:state.shifts,salaries:state.salaries,notes:state.notes,summaries:state.summaries,reminder:state.reminder}))}function loadCache(){try{return JSON.parse(localStorage.getItem(LS_CACHE)||'null')}catch(e){return null}}
    function newShift(date){return{id:uid('shift'),data:date,inizio:'',fine:'',pausa_minuti:0,minuti_lavorati:0,nota:'',manuale:false,creato_il:new Date().toISOString(),aggiornato_il:new Date().toISOString()}}function upsertLocalShift(s){state._localMutationAt=Date.now();const i=state.shifts.findIndex(x=>x.id===s.id);if(i>=0)state.shifts[i]=s;else state.shifts.push(s);saveCache()}function upsertLocalSalary(s){state._localMutationAt=Date.now();const i=state.salaries.findIndex(x=>x.id===s.id||x.mese_lavorato===s.mese_lavorato);if(i>=0)state.salaries[i]=s;else state.salaries.push(s);saveCache()}function getTodayShift(){return state.shifts.find(s=>s.data===today())}function getCurrentSummary(){return(state.summaries||[]).find(s=>s.mese===currentMonth())||null}
    function recomputeLocalSummaries(){const groups={};state.shifts.forEach(s=>{if(!s.data)return;const m=s.data.slice(0,7);if(!groups[m])groups[m]={mese:m,minuti:0,days:new Set(),turni:0};const mins=Number(s.minuti_lavorati||computeMinutes(s.inizio,s.fine,s.pausa_minuti||0));groups[m].minuti+=mins;if(mins>0)groups[m].days.add(s.data);groups[m].turni++});const avg=localAverageRate(groups);state.summaries=Object.keys(groups).sort().reverse().map(m=>{const g=groups[m],ore=g.minuti/60,sal=state.salaries.find(s=>s.mese_lavorato===m),reale=sal?Number(sal.importo_reale||0):null,stimato=Math.round(ore*avg);return{mese:m,minuti:g.minuti,ore:Math.round(ore*100)/100,ore_label:minutesLabel(g.minuti),giorni:g.days.size,turni:g.turni,tariffa_media:Math.round(avg*100)/100,stimato,stipendio_reale:reale,differenza:reale!==null?Math.round(reale-stimato):null,tariffa_effettiva:reale!==null&&ore>0?Math.round((reale/ore)*100)/100:null}});saveCache()}function localAverageRate(groups){const n=Math.max(1,Number(state.config.media_mesi||6)),rates=[];[...state.salaries].sort((a,b)=>String(b.mese_lavorato).localeCompare(String(a.mese_lavorato))).forEach(s=>{if(rates.length>=n)return;const g=groups[s.mese_lavorato],ore=g?g.minuti/60:Number(s.ore_mese||0),amount=Number(s.importo_reale||0);if(amount>0&&ore>0)rates.push(amount/ore)});if(!rates.length)return Number(state.config.tariffa_media_default||10);return rates.reduce((a,b)=>a+b,0)/rates.length}
    function toggleTheme(){state._localMutationAt=Date.now();state.config.tema=state.config.tema==='dark'?'light':'dark';applyThemeLang();saveCache();enqueue({type:'saveConfig',payload:{tema:state.config.tema}});render();flushQueue()}function toggleLang(){state._localMutationAt=Date.now();state.config.lingua=state.config.lingua==='ru'?'it':'ru';applyThemeLang();saveCache();enqueue({type:'saveConfig',payload:{lingua:state.config.lingua}});render();flushQueue()}function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalBackdrop').classList.add('show');updateKbPad_()}function closeModal(){document.getElementById('modalBackdrop').classList.remove('show');document.documentElement.style.setProperty('--kb-pad','0px');state.__timePick=null}function help(msg){openModal('Info',`<p>${esc(msg)}</p><button class="main-action" onclick="closeModal()">OK</button>`)}function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>el.classList.remove('show'),2300)}
    function computeMinutes(start,end,pause){if(!start||!end)return 0;const[sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;mins-=Number(pause||0);return Math.max(0,mins)}function minutesLabel(mins){mins=Math.round(Number(mins||0));const h=Math.floor(mins/60),m=mins%60;return`${h} h ${String(m).padStart(2,'0')} min`}function elapsedLabel(start){return minutesLabel(computeMinutes(start,currentTime(),0))}function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function currentMonth(){return today().slice(0,7)}function previousMonth(dateStr){const d=dateStr?new Date(dateStr+'T00:00:00'):new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}function nextMonth(m){const d=new Date(m+'-01T00:00:00');d.setMonth(d.getMonth()+1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}function currentTime(){const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}function uid(p){return`${p}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`}function formatLongDate(ds){try{const l=state.config.lingua==='ru'?'ru-RU':'it-IT';return new Date(ds+'T12:00:00').toLocaleDateString(l,{weekday:'long',day:'numeric',month:'long',year:'numeric'})}catch(e){return ds}}function formatShortDate(ds){try{const l=state.config.lingua==='ru'?'ru-RU':'it-IT';return new Date(ds+'T12:00:00').toLocaleDateString(l)}catch(e){return ds}}function monthLabel(ms){try{const l=state.config.lingua==='ru'?'ru-RU':'it-IT';return new Date(ms+'-01T12:00:00').toLocaleDateString(l,{month:'long',year:'numeric'})}catch(e){return ms}}function currency(n){return`${Math.round(Number(n||0))} €`}function val(id){const el=document.getElementById(id);return el?el.value:''}function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v||''}function esc(str){return String(str||'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
  </script>
