  <title>Alina Lavoro</title>
  <style>
    :root{--bg:#f6f7fb;--surface:rgba(255,255,255,.92);--surface2:#fff;--text:#1f2430;--muted:#667085;--border:rgba(31,36,48,.12);--primary:#6c5ce7;--primary2:#00cec9;--danger:#d63031;--warning:#f39c12;--shadow:0 18px 45px rgba(31,36,48,.12);--radius:24px;--font:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}

      }
    }

    .nav .ico{font-size:19px;line-height:1}

    label{font-weight:850;font-size:14px;color:var(--text)}

    textarea{min-height:100px;resize:vertical}
    .time-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .time-choice-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
    .time-choice-btn{min-height:72px;font-size:21px;font-weight:950;border-radius:18px;width:100%;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:50;display:none;align-items:flex-end;justify-content:center;padding:12px;padding-bottom:max(12px,env(safe-area-inset-bottom,0px))}
    .modal-backdrop.show{display:flex}
    .modal{width:min(680px,100%);max-height:min(92dvh,92vh,820px);display:flex;flex-direction:column;overflow:hidden;background:var(--surface2);color:var(--text);border-radius:28px;box-shadow:var(--shadow);border:1px solid var(--border);padding:0}

    .modal-title{margin:0;font-size:22px;font-weight:950}

    .login{width:min(440px,100%);margin:auto 0;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:30px;padding:22px 20px}
    #loginBtn{scroll-margin-bottom:32px}
    .login h1{font-size:28px;margin:10px 0 4px;letter-spacing:-.04em}
    .login p{color:var(--muted);margin:0 0 14px}
    .help{color:var(--muted);font-size:13px;line-height:1.35}
    .app-version{margin:14px 0 0;padding-top:12px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;line-height:1.35;text-align:center}
    .credit{margin:8px 0 0;color:var(--muted);font-size:12px;line-height:1.35;text-align:center}

      .status-title{font-size:21px}
      .metric{min-height:88px;padding:12px}
      .metric .value{font-size:21px}
      .brand h1{font-size:20px}
      .top-actions{gap:6px}
      .icon-btn{width:40px;height:40px;border-radius:14px}

      .list-item--month .btn-row{margin-top:10px}
      .list-item--month .secondary-btn{min-height:44px;padding:0 12px;font-size:13px;border-radius:14px}
      .months-year-toggle{min-height:50px;padding:11px 13px;font-size:14px;border-radius:16px}
      .months-year-toggle-chev{font-size:15px}
      .list--months{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;align-items:stretch}
      .list--months > .list-item--month{min-width:0}

    @media(max-width:360px){
      .list--months{grid-template-columns:1fr}
    }
    @media(min-width:900px){
      .app{padding-bottom:32px}

    }
    @media(max-width:1024px) and (orientation:portrait){
      .app{max-width:540px}
      .grid,.time-grid{grid-template-columns:1fr}
      .nav{width:min(calc(100vw - 16px),520px)}
    }
  </style>
</head>

    function endWork(){var s=getTodayShift();if(!s||!s.inizio)return openManualShiftModal();var det=currentTime();if(isHHMMOnFiveStep(det)){commitEndWork(s,det);return}var fc=fiveMinuteFloorCeilStrings(det);openTimePickModal_('fine',det,fc.loStr,fc.hiStr,s)}
    function openManualShiftModal(shiftId){const s=shiftId?state.shifts.find(x=>x.id===shiftId):(getTodayShift()||newShift(today()));openModal(t('edit_times'),`<div class="field"><label>${t('date')}</label><input id="m_data" type="date" value="${s.data||today()}"></div><div class="time-grid"><div class="field"><label>${t('start')}</label><input id="m_inizio" type="time" step="300" value="${s.inizio||'08:30'}"></div><div class="field"><label>${t('end')}</label><input id="m_fine" type="time" step="300" value="${s.fine||''}"></div></div><div class="field"><label>${t('pause')}</label><input id="m_pausa" type="number" min="0" step="5" value="${s.pausa_minuti||0}"></div><div class="field"><label>${t('note')}</label><textarea id="m_nota">${esc(s.nota||'')}</textarea></div><button class="main-action" onclick="saveManualShift('${s.id}')">${t('save')}</button>`)}function saveManualShift(id){const s=state.shifts.find(x=>x.id===id)||newShift(val('m_data'));s.data=val('m_data');s.inizio=val('m_inizio');s.fine=val('m_fine');s.pausa_minuti=Number(val('m_pausa')||0);s.nota=val('m_nota');s.manuale=true;s.minuti_lavorati=computeMinutes(s.inizio,s.fine,s.pausa_minuti);s.aggiornato_il=new Date().toISOString();upsertLocalShift(s);recomputeLocalSummaries();enqueue({type:'saveShift',payload:s});closeModal();render();toast(t('saved'));flushQueue()}
    function openSalaryModal(monthWorked,monthPayslip){const mw=monthWorked||previousMonth(today()),mb=monthPayslip||currentMonth(),summary=state.summaries.find(s=>s.mese===mw),existing=state.salaries.find(s=>s.mese_lavorato===mw);openModal(t('salary'),`<div class="field"><label>${t('worked_month')}</label><input id="sal_mese_lavorato" type="month" value="${mw}"></div><div class="field"><label>${t('payslip_month')}</label><input id="sal_mese_busta" type="month" value="${mb}"></div><div class="field"><label>${t('amount')}</label><input id="sal_importo" type="number" step="1" min="0" value="${existing?existing.importo_reale:''}" placeholder="700"></div><div class="field"><label>${t('note')}</label><textarea id="sal_note">${existing?esc(existing.note||''):''}</textarea></div><p class="help">${t('month_hours')}: ${summary?summary.ore_label:'0 h 00 min'}</p><button class="main-action" onclick="saveSalaryLocal('${existing?existing.id:''}')">${t('save')}</button>`)}function saveSalaryLocal(existingId){const mw=val('sal_mese_lavorato'),summary=state.summaries.find(s=>s.mese===mw),amount=Number(val('sal_importo')||0),hours=summary?Number(summary.ore||0):0;const salary={id:existingId||uid('salary'),mese_lavorato:mw,mese_busta:val('sal_mese_busta'),data_inserimento:today(),importo_reale:amount,ore_mese:hours,tariffa_effettiva:hours>0?amount/hours:0,note:val('sal_note'),creato_il:new Date().toISOString(),aggiornato_il:new Date().toISOString()};upsertLocalSalary(salary);recomputeLocalSummaries();enqueue({type:'saveSalary',payload:salary});closeModal();render();toast(t('saved'));flushQueue()}
    function openNoteModal(){openModal(t('new_note'),`<div class="field"><label>${t('date')}</label><input id="note_data" type="date" value="${today()}"></div><div class="field"><label>Tipo</label><select id="note_tipo"><option value="generale">Generale</option><option value="giorno">Giorno</option><option value="busta_paga">Busta paga</option></select></div><div class="field"><label>${t('note')}</label><textarea id="note_testo" placeholder="Scrivi una nota..."></textarea></div><button class="main-action" onclick="saveNoteLocal()">${t('save')}</button>`)}function saveNoteLocal(){const n={id:uid('note'),data:val('note_data'),tipo:val('note_tipo'),testo:val('note_testo'),completata:false,creato_il:new Date().toISOString(),aggiornato_il:new Date().toISOString()};state.notes.unshift(n);saveCache();enqueue({type:'saveNote',payload:n});closeModal();render();toast(t('saved'));flushQueue()}function toggleNoteDone(id){const n=state.notes.find(x=>x.id===id);if(!n)return;n.completata=String(n.completata)==='true'?'false':'true';n.aggiornato_il=new Date().toISOString();saveCache();enqueue({type:'saveNote',payload:n});render();flushQueue()}function deleteNoteLocal(id){state.notes=state.notes.filter(n=>n.id!==id);saveCache();enqueue({type:'deleteNote',payload:{id}});render();flushQueue()}
    function saveSettings(){const patch={lingua:val('cfg_lingua'),tema:val('cfg_tema'),stile:val('cfg_stile'),giorno_busta:val('cfg_giorno_busta'),media_mesi:val('cfg_media_mesi'),setup_completato:'yes'};const newCode=val('cfg_codice_accesso');if(newCode){patch.codice_accesso=newCode;state.accessCode=newCode;localStorage.setItem(LS_ACCESS,newCode)}state.config={...state.config,...patch};delete state.config.codice_accesso;applyThemeLang();saveCache();enqueue({type:'saveConfig',payload:patch});toast(t('saved'));render();flushQueue()}
    function openSetupModal(){openModal(t('setup'),`<div class="field"><label>${t('language')}</label><select id="setup_lingua"><option value="it">Italiano</option><option value="ru">Русский</option></select></div><div class="field"><label>${t('theme')}</label><select id="setup_tema"><option value="light">${t('light')}</option><option value="dark">${t('dark')}</option></select></div><div class="field"><label>${t('style')}</label><select id="setup_stile"><option value="modern">${t('modern')}</option><option value="romantic">${t('romantic')}</option><option value="sport">${t('sport')}</option><option value="loving">${t('loving')}</option><option value="classic">${t('classic')}</option><option value="dramatic">${t('dramatic')}</option></select></div><div class="time-grid"><div class="field"><label>${t('payroll_day')}</label><input id="setup_giorno" type="number" min="1" max="31" value="10"></div><div class="field"><label>${t('avg_months')}</label><select id="setup_media"><option value="3">3</option><option value="6" selected>6</option><option value="99">Tutti</option></select></div></div><button class="main-action" onclick="saveSetup()">${t('save')}</button>`)}function saveSetup(){state.config={...state.config,lingua:val('setup_lingua'),tema:val('setup_tema'),stile:val('setup_stile'),giorno_busta:val('setup_giorno'),media_mesi:val('setup_media'),setup_completato:'yes'};closeModal();applyThemeLang();render();enqueue({type:'saveConfig',payload:state.config});saveCache();flushQueue()}
    async function flushQueue(){const q=getQueue();if(!q.length||!state.accessCode)return;if(!navigator.onLine)return render();try{const res=await serverCall('syncBatch',[state.accessCode,q]);localStorage.setItem(LS_QUEUE,JSON.stringify([]));if(res&&res.success){mergeServerData(res.data);state.serverOk=true;saveCache();render();toast(t('synced'))}}catch(err){state.serverOk=false;toast(t('sync_error'));render()}}
    function enqueue(action){const q=getQueue();q.push(action);localStorage.setItem(LS_QUEUE,JSON.stringify(q));saveCache()}function getQueue(){try{return JSON.parse(localStorage.getItem(LS_QUEUE)||'[]')}catch(e){return[]}}function saveCache(){localStorage.setItem(LS_CACHE,JSON.stringify({accessCode:state.accessCode,config:state.config,shifts:state.shifts,salaries:state.salaries,notes:state.notes,summaries:state.summaries,reminder:state.reminder}))}function loadCache(){try{return JSON.parse(localStorage.getItem(LS_CACHE)||'null')}catch(e){return null}}
    function newShift(date){return{id:uid('shift'),data:date,inizio:'',fine:'',pausa_minuti:0,minuti_lavorati:0,nota:'',manuale:false,creato_il:new Date().toISOString(),aggiornato_il:new Date().toISOString()}}function upsertLocalShift(s){const i=state.shifts.findIndex(x=>x.id===s.id);if(i>=0)state.shifts[i]=s;else state.shifts.push(s);saveCache()}function upsertLocalSalary(s){const i=state.salaries.findIndex(x=>x.id===s.id||x.mese_lavorato===s.mese_lavorato);if(i>=0)state.salaries[i]=s;else state.salaries.push(s);saveCache()}function getTodayShift(){return state.shifts.find(s=>s.data===today())}function getCurrentSummary(){return(state.summaries||[]).find(s=>s.mese===currentMonth())||null}
    function recomputeLocalSummaries(){const groups={};state.shifts.forEach(s=>{if(!s.data)return;const m=s.data.slice(0,7);if(!groups[m])groups[m]={mese:m,minuti:0,days:new Set(),turni:0};const mins=Number(s.minuti_lavorati||computeMinutes(s.inizio,s.fine,s.pausa_minuti||0));groups[m].minuti+=mins;if(mins>0)groups[m].days.add(s.data);groups[m].turni++});const avg=localAverageRate(groups);state.summaries=Object.keys(groups).sort().reverse().map(m=>{const g=groups[m],ore=g.minuti/60,sal=state.salaries.find(s=>s.mese_lavorato===m),reale=sal?Number(sal.importo_reale||0):null,stimato=Math.round(ore*avg);return{mese:m,minuti:g.minuti,ore:Math.round(ore*100)/100,ore_label:minutesLabel(g.minuti),giorni:g.days.size,turni:g.turni,tariffa_media:Math.round(avg*100)/100,stimato,stipendio_reale:reale,differenza:reale!==null?Math.round(reale-stimato):null,tariffa_effettiva:reale!==null&&ore>0?Math.round((reale/ore)*100)/100:null}});saveCache()}function localAverageRate(groups){const n=Math.max(1,Number(state.config.media_mesi||6)),rates=[];[...state.salaries].sort((a,b)=>String(b.mese_lavorato).localeCompare(String(a.mese_lavorato))).forEach(s=>{if(rates.length>=n)return;const g=groups[s.mese_lavorato],ore=g?g.minuti/60:Number(s.ore_mese||0),amount=Number(s.importo_reale||0);if(amount>0&&ore>0)rates.push(amount/ore)});if(!rates.length)return Number(state.config.tariffa_media_default||10);return rates.reduce((a,b)=>a+b,0)/rates.length}
    function toggleTheme(){state.config.tema=state.config.tema==='dark'?'light':'dark';applyThemeLang();saveCache();enqueue({type:'saveConfig',payload:{tema:state.config.tema}});render();flushQueue()}function toggleLang(){state.config.lingua=state.config.lingua==='ru'?'it':'ru';applyThemeLang();saveCache();enqueue({type:'saveConfig',payload:{lingua:state.config.lingua}});render();flushQueue()}function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalBackdrop').classList.add('show');updateKbPad_()}function closeModal(){document.getElementById('modalBackdrop').classList.remove('show');document.documentElement.style.setProperty('--kb-pad','0px');state.__timePick=null}function help(msg){openModal('Info',`<p>${esc(msg)}</p><button class="main-action" onclick="closeModal()">OK</button>`)}function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>el.classList.remove('show'),2300)}
    function computeMinutes(start,end,pause){if(!start||!end)return 0;const[sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;mins-=Number(pause||0);return Math.max(0,mins)}function minutesLabel(mins){mins=Math.round(Number(mins||0));const h=Math.floor(mins/60),m=mins%60;return`${h} h ${String(m).padStart(2,'0')} min`}function elapsedLabel(start){return minutesLabel(computeMinutes(start,currentTime(),0))}function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function currentMonth(){return today().slice(0,7)}function previousMonth(dateStr){const d=dateStr?new Date(dateStr+'T00:00:00'):new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}function nextMonth(m){const d=new Date(m+'-01T00:00:00');d.setMonth(d.getMonth()+1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}function currentTime(){const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}function uid(p){return`${p}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`}function formatLongDate(ds){try{const l=state.config.lingua==='ru'?'ru-RU':'it-IT';return new Date(ds+'T12:00:00').toLocaleDateString(l,{weekday:'long',day:'numeric',month:'long',year:'numeric'})}catch(e){return ds}}function formatShortDate(ds){try{const l=state.config.lingua==='ru'?'ru-RU':'it-IT';return new Date(ds+'T12:00:00').toLocaleDateString(l)}catch(e){return ds}}function monthLabel(ms){try{const l=state.config.lingua==='ru'?'ru-RU':'it-IT';return new Date(ms+'-01T12:00:00').toLocaleDateString(l,{month:'long',year:'numeric'})}catch(e){return ms}}function currency(n){return`${Math.round(Number(n||0))} €`}function val(id){const el=document.getElementById(id);return el?el.value:''}function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v||''}function esc(str){return String(str||'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
