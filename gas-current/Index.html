  <style>

    html[data-style="modern"]{--primary:#6c5ce7;--primary2:#00cec9}html[data-style="sport"]{--primary:#00b894;--primary2:#fd7e14}html[data-style="romantic"]{--primary:#e84393;--primary2:#a29bfe}html[data-style="loving"]{--primary:#ff7675;--primary2:#fab1a0}html[data-style="classic"]{--primary:#1d3557;--primary2:#457b9d}html[data-style="dramatic"]{--primary:#8e0038;--primary2:#6c5ce7}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:var(--font);color:var(--text);background:radial-gradient(circle at top left,color-mix(in srgb,var(--primary) 26%,transparent),transparent 35%),radial-gradient(circle at top right,color-mix(in srgb,var(--primary2) 22%,transparent),transparent 35%),var(--bg);-webkit-font-smoothing:antialiased}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.hidden{display:none!important}
    .app{max-width:980px;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 16px calc(92px + env(safe-area-inset-bottom))}.topbar{display:flex;gap:12px;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.brand-icon{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;color:#fff;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:var(--shadow);flex:0 0 auto}.brand h1{font-size:22px;line-height:1.05;margin:0}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}.top-actions{display:flex;align-items:center;gap:8px}.icon-btn{width:42px;height:42px;border-radius:15px;background:var(--surface);color:var(--text);box-shadow:0 8px 20px rgba(0,0,0,.08);border:1px solid var(--border);display:grid;place-items:center;font-weight:800}
    .card{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius);padding:18px;margin-bottom:16px;backdrop-filter:blur(12px)}.hero{padding:22px;overflow:hidden;position:relative}.hero:after{content:"";position:absolute;width:220px;height:220px;right:-90px;top:-100px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary2));opacity:.16;pointer-events:none}.kicker{color:var(--muted);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}.status-title{font-size:26px;line-height:1.12;margin:8px 0 6px;font-weight:900;letter-spacing:-.03em}.status-subtitle{margin:0;color:var(--muted);font-size:15px}.main-action{width:100%;min-height:84px;border-radius:26px;margin-top:18px;color:#fff;font-size:22px;font-weight:950;letter-spacing:.02em;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 20px 40px color-mix(in srgb,var(--primary) 34%,transparent)}.main-action.danger{background:linear-gradient(135deg,#d63031,#fd7e14);box-shadow:0 20px 40px rgba(214,48,49,.25)}
    .grid{display:grid;gap:14px;grid-template-columns:repeat(3,1fr)}.metric{background:var(--surface2);border-radius:20px;border:1px solid var(--border);padding:16px;min-height:112px}.metric .label{color:var(--muted);font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:6px}.metric .value{font-size:26px;line-height:1.05;font-weight:950;letter-spacing:-.04em}.metric .small{color:var(--muted);font-size:13px;margin-top:6px}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.secondary-btn,.ghost-btn,.danger-btn{min-height:48px;border-radius:16px;padding:0 15px;font-weight:800}.secondary-btn{background:color-mix(in srgb,var(--primary) 14%,var(--surface2));color:var(--primary);border:1px solid color-mix(in srgb,var(--primary) 20%,transparent)}.ghost-btn{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.danger-btn{background:color-mix(in srgb,var(--danger) 12%,var(--surface2));color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 20%,transparent)}
    .notice{border-radius:20px;border:1px solid color-mix(in srgb,var(--warning) 32%,transparent);background:color-mix(in srgb,var(--warning) 14%,var(--surface));padding:16px;margin-bottom:16px}.notice strong{display:block;margin-bottom:5px}.list{display:grid;gap:10px}.list-item{background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:14px;display:grid;gap:6px}.list-item-title{font-weight:900;font-size:17px}.list-item-sub{color:var(--muted);font-size:14px}.pill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:color-mix(in srgb,var(--primary) 12%,transparent);color:var(--primary);font-size:13px;font-weight:800}
    .nav{position:fixed;left:50%;bottom:calc(12px + env(safe-area-inset-bottom));transform:translateX(-50%);width:min(94vw,620px);background:var(--surface);border:1px solid var(--border);border-radius:26px;box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;z-index:20;backdrop-filter:blur(12px)}.nav button{min-height:54px;border-radius:18px;color:var(--muted);background:transparent;font-weight:900;display:grid;place-items:center;gap:2px;font-size:12px}.nav button.active{color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary2))}.nav .ico{font-size:19px;line-height:1}
    .field{display:grid;gap:8px;margin-bottom:14px}label{font-weight:850;font-size:14px;color:var(--text)}input,select,textarea{width:100%;min-height:54px;border:1px solid var(--border);border-radius:18px;padding:12px 14px;background:var(--surface2);color:var(--text);outline:none}textarea{min-height:100px;resize:vertical}.time-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:50;display:none;align-items:flex-end;justify-content:center;padding:12px}.modal-backdrop.show{display:flex}.modal{width:min(680px,100%);max-height:min(88vh,820px);overflow:auto;background:var(--surface2);color:var(--text);border-radius:28px;box-shadow:var(--shadow);padding:18px;border:1px solid var(--border)}.modal-header{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px}.modal-title{margin:0;font-size:22px;font-weight:950}
    .login-wrap{min-height:100vh;display:grid;place-items:center;padding:18px}.login{width:min(440px,100%);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:30px;padding:24px}.login h1{font-size:30px;margin:12px 0 4px;letter-spacing:-.04em}.login p{color:var(--muted);margin:0 0 18px}.help{color:var(--muted);font-size:13px;line-height:1.35}.tooltip{width:22px;height:22px;border-radius:50%;display:inline-grid;place-items:center;background:color-mix(in srgb,var(--primary) 15%,transparent);color:var(--primary);font-size:12px;font-weight:950}.toast{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#111827;color:#fff;padding:12px 16px;border-radius:999px;box-shadow:var(--shadow);z-index:70;display:none;font-weight:800;max-width:92vw;text-align:center}.toast.show{display:block}
    @media(max-width:720px){.app{padding-left:12px;padding-right:12px}.grid,.time-grid{grid-template-columns:1fr}.brand h1{font-size:20px}.status-title{font-size:24px}.metric .value{font-size:25px}.top-actions{gap:6px}.icon-btn{width:40px;height:40px;border-radius:14px}}
    @media(min-width:900px){.app{padding-bottom:32px}.nav{position:sticky;transform:none;width:100%;max-width:980px;margin:8px auto 18px;bottom:auto;left:auto;top:8px;order:-1}}
  </style>

<body>
  <div id="loginView" class="login-wrap"><div class="login"><div class="brand-icon">AL</div><h1>Alina Lavoro</h1><p id="loginSub">Inserisci il codice di accesso per aprire l’app.</p><div class="field"><label id="accessLabel">Codice accesso</label><input id="accessCode" type="password" inputmode="numeric" placeholder="1234"></div><button class="main-action" onclick="login()" id="loginBtn">ENTRA</button><p class="help" id="loginHelp">Codice iniziale predefinito: 1234. Cambialo nelle impostazioni dopo il primo accesso.</p>
      <div class="credit">Realizzata da <strong>Tuso Martino</strong></div></div></div>
  <div id="appView" class="app hidden"><header class="topbar"><div class="brand"><div class="brand-icon">AL</div><div><h1>Alina Lavoro</h1><p id="todayLabel"></p></div></div><div class="top-actions"><button class="icon-btn" onclick="toggleTheme()" title="Tema">☀️</button><button class="icon-btn" onclick="toggleLang()" title="Lingua">IT</button><button class="icon-btn" onclick="setPage('settings')" title="Impostazioni">⚙️</button></div></header><main id="content"></main></div>
  <nav id="nav" class="nav hidden"><button onclick="setPage('home')" data-page="home" class="active"><span class="ico">🏠</span><span data-i18n="nav_home">Home</span></button><button onclick="setPage('months')" data-page="months"><span class="ico">📅</span><span data-i18n="nav_months">Mesi</span></button><button onclick="setPage('notes')" data-page="notes"><span class="ico">📝</span><span data-i18n="nav_notes">Note</span></button><button onclick="setPage('settings')" data-page="settings"><span class="ico">⚙️</span><span data-i18n="nav_settings">Imp.</span></button></nav>
  <div id="modalBackdrop" class="modal-backdrop"><div class="modal"><div class="modal-header"><h2 id="modalTitle" class="modal-title"></h2><button class="icon-btn" onclick="closeModal()">✕</button></div><div id="modalBody"></div></div></div><div id="toast" class="toast"></div>
  <script>
    const LS_CACHE='alina_lavoro_cache_v1',LS_QUEUE='alina_lavoro_queue_v1',LS_ACCESS='alina_lavoro_access_v1';
    const I18N={it:{nav_home:'Home',nav_months:'Mesi',nav_notes:'Note',nav_settings:'Imp.',login_sub:'Inserisci il codice di accesso per aprire l’app.',access_code:'Codice accesso',enter:'ENTRA',hello:'Ciao Alina',not_started:'Non hai ancora iniziato',started_at:'Lavoro iniziato alle',ended_at:'Lavoro terminato alle',start_work:'INIZIO LAVORO',end_work:'FINE LAVORO',today_hours:'Ore oggi',month_days:'Giorni mese',month_hours:'Ore mese',estimated:'Guadagno stimato',average_rate:'Tariffa media',edit_times:'Modifica orari',salary:'Stipendio reale',synced:'Tutto sincronizzato',pending:'dati da sincronizzare',offline:'Connessione assente',reminder:'Promemoria',salary_missing:'Manca lo stipendio reale del mese',insert:'Inserisci',later:'Più tardi',months_title:'Riepilogo mesi',no_data:'Nessun dato disponibile.',real:'Reale',difference:'Differenza',notes_title:'Note e promemoria',new_note:'Nuova nota',completed:'Completata',settings_title:'Impostazioni',language:'Lingua',theme:'Tema',style:'Stile',light:'Chiaro',dark:'Scuro',modern:'Moderno',sport:'Sportivo',romantic:'Romantico',loving:'Amorevole',classic:'Classico',dramatic:'Drammatico',payroll_day:'Giorno busta paga',avg_months:'Media mesi',save:'Salva',date:'Data',start:'Inizio',end:'Fine',pause:'Pausa minuti',note:'Nota',amount:'Importo ricevuto',worked_month:'Mese lavorato',payslip_month:'Mese busta',saved:'Salvato',sync_error:'Errore sincronizzazione',loading:'Caricamento...',tooltip_estimated:'Il guadagno stimato usa la media degli stipendi reali inseriti.',tooltip_rate:'La tariffa media viene aggiornata con gli stipendi reali.',setup:'Configurazione iniziale',access_help:'Codice iniziale predefinito: 1234. Cambialo nelle impostazioni dopo il primo accesso.',change_code:'Nuovo codice accesso'},ru:{nav_home:'Главная',nav_months:'Месяцы',nav_notes:'Заметки',nav_settings:'Настр.',login_sub:'Введите код доступа, чтобы открыть приложение.',access_code:'Код доступа',enter:'ВОЙТИ',hello:'Привет, Алина',not_started:'Работа еще не начата',started_at:'Работа началась в',ended_at:'Работа закончена в',start_work:'НАЧАТЬ РАБОТУ',end_work:'ЗАКОНЧИТЬ РАБОТУ',today_hours:'Часы сегодня',month_days:'Дни месяца',month_hours:'Часы месяца',estimated:'Примерный доход',average_rate:'Средняя ставка',edit_times:'Изменить время',salary:'Реальная зарплата',synced:'Все синхронизировано',pending:'записей для синхронизации',offline:'Нет соединения',reminder:'Напоминание',salary_missing:'Не введена зарплата за месяц',insert:'Ввести',later:'Позже',months_title:'Архив месяцев',no_data:'Нет данных.',real:'Реально',difference:'Разница',notes_title:'Заметки и напоминания',new_note:'Новая заметка',completed:'Выполнено',settings_title:'Настройки',language:'Язык',theme:'Тема',style:'Стиль',light:'Светлая',dark:'Темная',modern:'Современный',sport:'Спортивный',romantic:'Романтический',loving:'Нежный',classic:'Классический',dramatic:'Драматичный',payroll_day:'День зарплаты',avg_months:'Среднее за месяцев',save:'Сохранить',date:'Дата',start:'Начало',end:'Конец',pause:'Пауза минуты',note:'Заметка',amount:'Полученная сумма',worked_month:'Рабочий месяц',payslip_month:'Месяц выплаты',saved:'Сохранено',sync_error:'Ошибка синхронизации',loading:'Загрузка...',tooltip_estimated:'Примерный доход рассчитывается по средней ставке из введенных зарплат.',tooltip_rate:'Средняя ставка обновляется после ввода реальной зарплаты.',setup:'Первичная настройка',access_help:'Начальный код: 1234. Измените его в настройках после первого входа.',change_code:'Новый код доступа'}};
    let state={accessCode:'',page:'home',config:{lingua:'it',tema:'light',stile:'modern',giorno_busta:'10',promemoria_busta:'0',media_mesi:'6',tariffa_media_default:'10',setup_completato:'no'},shifts:[],salaries:[],notes:[],summaries:[],reminder:{active:false},serverOk:false};
    document.addEventListener('DOMContentLoaded',()=>{const c=loadCache();if(c)state={...state,...c};applyThemeLang();const saved=localStorage.getItem(LS_ACCESS);if(saved){document.getElementById('accessCode').value=saved;login()}window.addEventListener('online',flushQueue)});
    function t(k){const l=state.config.lingua||'it';return I18N[l]?.[k]||I18N.it[k]||k}function serverCall(fn,args=[]){return new Promise((resolve,reject)=>{if(typeof google==='undefined'||!google.script||!google.script.run){reject(new Error('google.script.run non disponibile'));return}google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn](...args)})}
    async function login(){const code=document.getElementById('accessCode').value.trim();if(!code)return toast(t('access_code'));state.accessCode=code;localStorage.setItem(LS_ACCESS,code);toast(t('loading'));try{const res=await serverCall('getBootstrap',[code]);if(!res||!res.success)throw new Error(res?.message||'Accesso negato');mergeServerData(res.data);state.serverOk=true;saveCache();showApp();if(state.config.setup_completato!=='yes')openSetupModal();await flushQueue()}catch(err){state.serverOk=false;const cached=loadCache();if(cached&&cached.accessCode===code){showApp();toast(t('offline'))}else toast(err.message||'Errore accesso')}}
    function showApp(){document.getElementById('loginView').classList.add('hidden');document.getElementById('appView').classList.remove('hidden');document.getElementById('nav').classList.remove('hidden');applyThemeLang();render()}function mergeServerData(data){state.config={...state.config,...(data.config||{})};state.shifts=data.shifts||[];state.salaries=data.salaries||[];state.notes=data.notes||[];state.summaries=data.summaries||[];state.reminder=data.reminder||{active:false}}
    function applyThemeLang(){document.documentElement.dataset.theme=state.config.tema||'light';document.documentElement.dataset.style=state.config.stile||'modern';document.documentElement.lang=state.config.lingua||'it';document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));const sub=document.getElementById('loginSub');if(sub){sub.textContent=t('login_sub');document.getElementById('accessLabel').textContent=t('access_code');document.getElementById('loginBtn').textContent=t('enter');document.getElementById('loginHelp').textContent=t('access_help')}}
    function setPage(page){state.page=page;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));render()}function render(){applyThemeLang();document.getElementById('todayLabel').textContent=formatLongDate(today());if(state.page==='home')renderHome();if(state.page==='months')renderMonths();if(state.page==='notes')renderNotes();if(state.page==='settings')renderSettings()}
    function renderHome(){const ts=getTodayShift(),open=ts&&ts.inizio&&!ts.fine,done=ts&&ts.inizio&&ts.fine,current=getCurrentSummary(),q=getQueue();let title=t('not_started'),sub='';if(open){title=`${t('started_at')} ${ts.inizio}`;sub=`${t('today_hours')}: ${elapsedLabel(ts.inizio)}`}if(done){title=`${t('ended_at')} ${ts.fine}`;sub=`${t('today_hours')}: ${minutesLabel(Number(ts.minuti_lavorati||0))}`}const syncText=!navigator.onLine?t('offline'):q.length?`${q.length} ${t('pending')}`:t('synced');document.getElementById('content').innerHTML=`${state.reminder&&state.reminder.active?`<section class="notice"><strong>💶 ${t('reminder')}</strong><div>${t('salary_missing')} ${monthLabel(state.reminder.mese_lavorato)}.</div><div class="btn-row"><button class="secondary-btn" onclick="openSalaryModal('${state.reminder.mese_lavorato}','${state.reminder.mese_busta}')">${t('insert')}</button><button class="ghost-btn" onclick="toast('${t('later')}')">${t('later')}</button></div></section>`:''}<section class="card hero"><div class="kicker">${t('hello')}</div><div class="status-title">${title}</div><p class="status-subtitle">${sub||formatLongDate(today())}</p>${open?`<button class="main-action danger" onclick="endWork()">${t('end_work')}</button>`:`<button class="main-action" onclick="startWork()">${t('start_work')}</button>`}<div class="btn-row"><button class="secondary-btn" onclick="openManualShiftModal()">${t('edit_times')}</button><button class="ghost-btn" onclick="openSalaryModal()">${t('salary')}</button></div></section><section class="grid"><div class="metric"><div class="label">${t('today_hours')}</div><div class="value">${ts&&ts.minuti_lavorati?minutesLabel(Number(ts.minuti_lavorati)):(open?elapsedLabel(ts.inizio):'0 h 00 min')}</div></div><div class="metric"><div class="label">${t('month_days')}</div><div class="value">${current?current.giorni:0}</div></div><div class="metric"><div class="label">${t('month_hours')}</div><div class="value">${current?current.ore_label:'0 h 00 min'}</div></div></section><section class="card"><div class="metric" style="min-height:auto"><div class="label">${t('estimated')} <button class="tooltip" onclick="help('${t('tooltip_estimated')}')">?</button></div><div class="value">${currency(current?current.stimato:0)}</div><div class="small">${t('average_rate')} <button class="tooltip" onclick="help('${t('tooltip_rate')}')">?</button>: ${current?current.tariffa_media:state.config.tariffa_media_default} €/h</div></div><div class="btn-row"><span class="pill">${syncText}</span><button class="ghost-btn" onclick="flushQueue()">Sync</button></div></section>${renderActiveNotesMini()}`}
    function renderActiveNotesMini(){const a=state.notes.filter(n=>String(n.completata)!=='true').slice(0,3);if(!a.length)return'';return`<section class="card"><div class="kicker">${t('notes_title')}</div><div class="list">${a.map(n=>`<div class="list-item"><div class="list-item-title">📝 ${esc(n.testo)}</div><div class="list-item-sub">${formatShortDate(n.data)} · ${n.tipo}</div></div>`).join('')}</div><div class="btn-row"><button class="secondary-btn" onclick="setPage('notes')">${t('nav_notes')}</button></div></section>`}
    function renderMonths(){const items=state.summaries||[];document.getElementById('content').innerHTML=`<section class="card"><div class="kicker">📅</div><div class="status-title">${t('months_title')}</div><p class="status-subtitle">${items.length?'':t('no_data')}</p></section><section class="list">${items.map(s=>`<article class="list-item"><div class="list-item-title">${monthLabel(s.mese)}</div><div class="list-item-sub">${t('month_days')}: ${s.giorni} · ${t('month_hours')}: ${s.ore_label}</div><div class="btn-row"><span class="pill">${t('estimated')}: ${currency(s.stimato)}</span>${s.stipendio_reale!==null&&s.stipendio_reale!==undefined?`<span class="pill">${t('real')}: ${currency(s.stipendio_reale)}</span>`:''}${s.differenza!==null&&s.differenza!==undefined?`<span class="pill">${t('difference')}: ${currency(s.differenza)}</span>`:''}</div><div class="btn-row"><button class="secondary-btn" onclick="openSalaryModal('${s.mese}','${nextMonth(s.mese)}')">${t('salary')}</button></div></article>`).join('')}</section>`}
    function renderNotes(){const notes=state.notes||[];document.getElementById('content').innerHTML=`<section class="card"><div class="kicker">📝</div><div class="status-title">${t('notes_title')}</div><div class="btn-row"><button class="secondary-btn" onclick="openNoteModal()">${t('new_note')}</button></div></section><section class="list">${notes.length?notes.map(n=>`<article class="list-item"><div class="list-item-title">${String(n.completata)==='true'?'✅':'📝'} ${esc(n.testo)}</div><div class="list-item-sub">${formatShortDate(n.data)} · ${n.tipo}</div><div class="btn-row"><button class="secondary-btn" onclick="toggleNoteDone('${n.id}')">${t('completed')}</button><button class="danger-btn" onclick="deleteNoteLocal('${n.id}')">Elimina</button></div></article>`).join(''):`<div class="card">${t('no_data')}</div>`}</section>`}
    function renderSettings(){document.getElementById('content').innerHTML=`<section class="card"><div class="kicker">⚙️</div><div class="status-title">${t('settings_title')}</div><div class="field"><label>${t('language')}</label><select id="cfg_lingua"><option value="it">Italiano</option><option value="ru">Русский</option></select></div><div class="field"><label>${t('theme')}</label><select id="cfg_tema"><option value="light">${t('light')}</option><option value="dark">${t('dark')}</option></select></div><div class="field"><label>${t('style')}</label><select id="cfg_stile"><option value="modern">${t('modern')}</option><option value="sport">${t('sport')}</option><option value="romantic">${t('romantic')}</option><option value="loving">${t('loving')}</option><option value="classic">${t('classic')}</option><option value="dramatic">${t('dramatic')}</option></select></div><div class="time-grid"><div class="field"><label>${t('payroll_day')}</label><input id="cfg_giorno_busta" type="number" min="1" max="31"></div><div class="field"><label>${t('avg_months')}</label><select id="cfg_media_mesi"><option value="3">3</option><option value="6">6</option><option value="99">Tutti</option></select></div></div><div class="field"><label>${t('change_code')}</label><input id="cfg_codice_accesso" type="password" placeholder="Lascia vuoto per non cambiare"></div><button class="main-action" onclick="saveSettings()">${t('save')}</button>

          <div class="credit" data-i18n="about_credit">App realizzata da Tuso Martino</div></section>`;setVal('cfg_lingua',state.config.lingua);setVal('cfg_tema',state.config.tema);setVal('cfg_stile',state.config.stile);setVal('cfg_giorno_busta',state.config.giorno_busta);setVal('cfg_media_mesi',state.config.media_mesi)}
    function startWork(){let s=getTodayShift();if(s&&s.inizio&&!s.fine)return toast(`${t('started_at')} ${s.inizio}`);if(!s)s=newShift(today());s.inizio=currentTime();s.fine='';s.minuti_lavorati=0;s.aggiornato_il=new Date().toISOString();upsertLocalShift(s);enqueue({type:'saveShift',payload:s});render();toast(`${t('started_at')} ${s.inizio}`);flushQueue()}function endWork(){let s=getTodayShift();if(!s||!s.inizio)return openManualShiftModal();s.fine=currentTime();s.minuti_lavorati=computeMinutes(s.inizio,s.fine,Number(s.pausa_minuti||0));s.aggiornato_il=new Date().toISOString();upsertLocalShift(s);recomputeLocalSummaries();enqueue({type:'saveShift',payload:s});render();toast(`${t('saved')}: ${minutesLabel(s.minuti_lavorati)}`);flushQueue()}
    function openManualShiftModal(shiftId){const s=shiftId?state.shifts.find(x=>x.id===shiftId):(getTodayShift()||newShift(today()));openModal(t('edit_times'),`<div class="field"><label>${t('date')}</label><input id="m_data" type="date" value="${s.data||today()}"></div><div class="time-grid"><div class="field"><label>${t('start')}</label><input id="m_inizio" type="time" step="300" value="${s.inizio||'08:30'}"></div><div class="field"><label>${t('end')}</label><input id="m_fine" type="time" step="300" value="${s.fine||''}"></div></div><div class="field"><label>${t('pause')}</label><input id="m_pausa" type="number" min="0" step="5" value="${s.pausa_minuti||0}"></div><div class="field"><label>${t('note')}</label><textarea id="m_nota">${esc(s.nota||'')}</textarea></div><button class="main-action" onclick="saveManualShift('${s.id}')">${t('save')}</button>`)}function saveManualShift(id){const s=state.shifts.find(x=>x.id===id)||newShift(val('m_data'));s.data=val('m_data');s.inizio=val('m_inizio');s.fine=val('m_fine');s.pausa_minuti=Number(val('m_pausa')||0);s.nota=val('m_nota');s.manuale=true;s.minuti_lavorati=computeMinutes(s.inizio,s.fine,s.pausa_minuti);s.aggiornato_il=new Date().toISOString();upsertLocalShift(s);recomputeLocalSummaries();enqueue({type:'saveShift',payload:s});closeModal();render();toast(t('saved'));flushQueue()}
    function openSalaryModal(monthWorked,monthPayslip){const mw=monthWorked||previousMonth(today()),mb=monthPayslip||currentMonth(),summary=state.summaries.find(s=>s.mese===mw),existing=state.salaries.find(s=>s.mese_lavorato===mw);openModal(t('salary'),`<div class="field"><label>${t('worked_month')}</label><input id="sal_mese_lavorato" type="month" value="${mw}"></div><div class="field"><label>${t('payslip_month')}</label><input id="sal_mese_busta" type="month" value="${mb}"></div><div class="field"><label>${t('amount')}</label><input id="sal_importo" type="number" step="1" min="0" value="${existing?existing.importo_reale:''}" placeholder="700"></div><div class="field"><label>${t('note')}</label><textarea id="sal_note">${existing?esc(existing.note||''):''}</textarea></div><p class="help">${t('month_hours')}: ${summary?summary.ore_label:'0 h 00 min'}</p><button class="main-action" onclick="saveSalaryLocal('${existing?existing.id:''}')">${t('save')}</button>`)}function saveSalaryLocal(existingId){const mw=val('sal_mese_lavorato'),summary=state.summaries.find(s=>s.mese===mw),amount=Number(val('sal_importo')||0),hours=summary?Number(summary.ore||0):0;const salary={id:existingId||uid('salary'),mese_lavorato:mw,mese_busta:val('sal_mese_busta'),data_inserimento:today(),importo_reale:amount,ore_mese:hours,tariffa_effettiva:hours>0?amount/hours:0,note:val('sal_note'),creato_il:new Date().toISOString(),aggiornato_il:new Date().toISOString()};upsertLocalSalary(salary);recomputeLocalSummaries();enqueue({type:'saveSalary',payload:salary});closeModal();render();toast(t('saved'));flushQueue()}
    function openNoteModal(){openModal(t('new_note'),`<div class="field"><label>${t('date')}</label><input id="note_data" type="date" value="${today()}"></div><div class="field"><label>Tipo</label><select id="note_tipo"><option value="generale">Generale</option><option value="giorno">Giorno</option><option value="busta_paga">Busta paga</option></select></div><div class="field"><label>${t('note')}</label><textarea id="note_testo" placeholder="Scrivi una nota..."></textarea></div><button class="main-action" onclick="saveNoteLocal()">${t('save')}</button>`)}function saveNoteLocal(){const n={id:uid('note'),data:val('note_data'),tipo:val('note_tipo'),testo:val('note_testo'),completata:false,creato_il:new Date().toISOString(),aggiornato_il:new Date().toISOString()};state.notes.unshift(n);saveCache();enqueue({type:'saveNote',payload:n});closeModal();render();toast(t('saved'));flushQueue()}function toggleNoteDone(id){const n=state.notes.find(x=>x.id===id);if(!n)return;n.completata=String(n.completata)==='true'?'false':'true';n.aggiornato_il=new Date().toISOString();saveCache();enqueue({type:'saveNote',payload:n});render();flushQueue()}function deleteNoteLocal(id){state.notes=state.notes.filter(n=>n.id!==id);saveCache();enqueue({type:'deleteNote',payload:{id}});render();flushQueue()}
    function saveSettings(){const patch={lingua:val('cfg_lingua'),tema:val('cfg_tema'),stile:val('cfg_stile'),giorno_busta:val('cfg_giorno_busta'),media_mesi:val('cfg_media_mesi'),setup_completato:'yes'};const newCode=val('cfg_codice_accesso');if(newCode){patch.codice_accesso=newCode;state.accessCode=newCode;localStorage.setItem(LS_ACCESS,newCode)}state.config={...state.config,...patch};delete state.config.codice_accesso;applyThemeLang();saveCache();enqueue({type:'saveConfig',payload:patch});toast(t('saved'));render();flushQueue()}
    function openSetupModal(){openModal(t('setup'),`<div class="field"><label>${t('language')}</label><select id="setup_lingua"><option value="it">Italiano</option><option value="ru">Русский</option></select></div><div class="field"><label>${t('theme')}</label><select id="setup_tema"><option value="light">${t('light')}</option><option value="dark">${t('dark')}</option></select></div><div class="field"><label>${t('style')}</label><select id="setup_stile"><option value="modern">${t('modern')}</option><option value="romantic">${t('romantic')}</option><option value="sport">${t('sport')}</option><option value="loving">${t('loving')}</option><option value="classic">${t('classic')}</option><option value="dramatic">${t('dramatic')}</option></select></div><div class="time-grid"><div class="field"><label>${t('payroll_day')}</label><input id="setup_giorno" type="number" min="1" max="31" value="10"></div><div class="field"><label>${t('avg_months')}</label><select id="setup_media"><option value="3">3</option><option value="6" selected>6</option><option value="99">Tutti</option></select></div></div><button class="main-action" onclick="saveSetup()">${t('save')}</button>`)}function saveSetup(){state.config={...state.config,lingua:val('setup_lingua'),tema:val('setup_tema'),stile:val('setup_stile'),giorno_busta:val('setup_giorno'),media_mesi:val('setup_media'),setup_completato:'yes'};closeModal();applyThemeLang();render();enqueue({type:'saveConfig',payload:state.config});saveCache();flushQueue()}
    async function flushQueue(){const q=getQueue();if(!q.length||!state.accessCode)return;if(!navigator.onLine)return render();try{const res=await serverCall('syncBatch',[state.accessCode,q]);localStorage.setItem(LS_QUEUE,JSON.stringify([]));if(res&&res.success){mergeServerData(res.data);state.serverOk=true;saveCache();render();toast(t('synced'))}}catch(err){state.serverOk=false;toast(t('sync_error'));render()}}
    function enqueue(action){const q=getQueue();q.push(action);localStorage.setItem(LS_QUEUE,JSON.stringify(q));saveCache()}function getQueue(){try{return JSON.parse(localStorage.getItem(LS_QUEUE)||'[]')}catch(e){return[]}}function saveCache(){localStorage.setItem(LS_CACHE,JSON.stringify({accessCode:state.accessCode,config:state.config,shifts:state.shifts,salaries:state.salaries,notes:state.notes,summaries:state.summaries,reminder:state.reminder}))}function loadCache(){try{return JSON.parse(localStorage.getItem(LS_CACHE)||'null')}catch(e){return null}}
    function newShift(date){return{id:uid('shift'),data,inizio:'',fine:'',pausa_minuti:0,minuti_lavorati:0,nota:'',manuale:false,creato_il:new Date().toISOString(),aggiornato_il:new Date().toISOString()}}function upsertLocalShift(s){const i=state.shifts.findIndex(x=>x.id===s.id);if(i>=0)state.shifts[i]=s;else state.shifts.push(s);saveCache()}function upsertLocalSalary(s){const i=state.salaries.findIndex(x=>x.id===s.id||x.mese_lavorato===s.mese_lavorato);if(i>=0)state.salaries[i]=s;else state.salaries.push(s);saveCache()}function getTodayShift(){return state.shifts.find(s=>s.data===today())}function getCurrentSummary(){return(state.summaries||[]).find(s=>s.mese===currentMonth())||null}
    function recomputeLocalSummaries(){const groups={};state.shifts.forEach(s=>{if(!s.data)return;const m=s.data.slice(0,7);groups[m]||={mese:m,minuti:0,days:new Set(),turni:0};const mins=Number(s.minuti_lavorati||computeMinutes(s.inizio,s.fine,s.pausa_minuti||0));groups[m].minuti+=mins;if(mins>0)groups[m].days.add(s.data);groups[m].turni++});const avg=localAverageRate(groups);state.summaries=Object.keys(groups).sort().reverse().map(m=>{const g=groups[m],ore=g.minuti/60,sal=state.salaries.find(s=>s.mese_lavorato===m),reale=sal?Number(sal.importo_reale||0):null,stimato=Math.round(ore*avg);return{mese:m,minuti:g.minuti,ore:Math.round(ore*100)/100,ore_label:minutesLabel(g.minuti),giorni:g.days.size,turni:g.turni,tariffa_media:Math.round(avg*100)/100,stimato,stipendio_reale:reale,differenza:reale!==null?Math.round(reale-stimato):null,tariffa_effettiva:reale!==null&&ore>0?Math.round((reale/ore)*100)/100:null}});saveCache()}function localAverageRate(groups){const n=Math.max(1,Number(state.config.media_mesi||6)),rates=[];[...state.salaries].sort((a,b)=>String(b.mese_lavorato).localeCompare(String(a.mese_lavorato))).forEach(s=>{if(rates.length>=n)return;const g=groups[s.mese_lavorato],ore=g?g.minuti/60:Number(s.ore_mese||0),amount=Number(s.importo_reale||0);if(amount>0&&ore>0)rates.push(amount/ore)});if(!rates.length)return Number(state.config.tariffa_media_default||10);return rates.reduce((a,b)=>a+b,0)/rates.length}
    function toggleTheme(){state.config.tema=state.config.tema==='dark'?'light':'dark';applyThemeLang();saveCache();enqueue({type:'saveConfig',payload:{tema:state.config.tema}});render();flushQueue()}function toggleLang(){state.config.lingua=state.config.lingua==='ru'?'it':'ru';applyThemeLang();saveCache();enqueue({type:'saveConfig',payload:{lingua:state.config.lingua}});render();flushQueue()}function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalBackdrop').classList.add('show')}function closeModal(){document.getElementById('modalBackdrop').classList.remove('show')}function help(msg){openModal('Info',`<p>${esc(msg)}</p><button class="main-action" onclick="closeModal()">OK</button>`)}function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>el.classList.remove('show'),2300)}
    function computeMinutes(start,end,pause){if(!start||!end)return 0;const[sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;mins-=Number(pause||0);return Math.max(0,mins)}function minutesLabel(mins){mins=Math.round(Number(mins||0));const h=Math.floor(mins/60),m=mins%60;return`${h} h ${String(m).padStart(2,'0')} min`}function elapsedLabel(start){return minutesLabel(computeMinutes(start,currentTime(),0))}function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function currentMonth(){return today().slice(0,7)}function previousMonth(dateStr){const d=dateStr?new Date(dateStr+'T00:00:00'):new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}function nextMonth(m){const d=new Date(m+'-01T00:00:00');d.setMonth(d.getMonth()+1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}function currentTime(){const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}function uid(p){return`${p}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`}function formatLongDate(ds){try{const l=state.config.lingua==='ru'?'ru-RU':'it-IT';return new Date(ds+'T12:00:00').toLocaleDateString(l,{weekday:'long',day:'numeric',month:'long',year:'numeric'})}catch(e){return ds}}function formatShortDate(ds){try{const l=state.config.lingua==='ru'?'ru-RU':'it-IT';return new Date(ds+'T12:00:00').toLocaleDateString(l)}catch(e){return ds}}function monthLabel(ms){try{const l=state.config.lingua==='ru'?'ru-RU':'it-IT';return new Date(ms+'-01T12:00:00').toLocaleDateString(l,{month:'long',year:'numeric'})}catch(e){return ms}}function currency(n){return`${Math.round(Number(n||0))} €`}function val(id){const el=document.getElementById(id);return el?el.value:''}function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v||''}function esc(str){return String(str||'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
  </script>
